server {
    listen 80;
    server_name localhost;
 
    root /usr/share/nginx/html;
    index index.html;
 
    # Compression gzip (optionnel mais recommandé)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
 
    # Angular utilise le routing côté client (Angular Router).
    # Sans cette règle, un rafraîchissement de page sur une route
    # comme /produits/42 renverrait une 404 côté Nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }
 
    # Cache long pour les assets buildés avec hash dans le nom de fichier
    location ~* \.(?:css|js|woff2?|ttf|svg|jpg|jpeg|png|gif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }
}
