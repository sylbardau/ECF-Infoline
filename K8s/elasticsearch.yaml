apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: infoline-es
  namespace: infoline
spec:
  version: 8.13.0
  nodeSets:
    - name: default
      count: 1
      config:
        node.store.allow_mmap: false
        xpack.ml.enabled: false
        xpack.watcher.enabled: false
        xpack.profiling.enabled: false
      podTemplate:
        spec:
          containers:
            - name: elasticsearch
              env:
                - name: ES_JAVA_OPTS
                  value: "-Xms400m -Xmx400m"
              resources:
                requests:
                  memory: 1Gi
                  cpu: 300m
                limits:
                  memory: 1Gi
                  cpu: 800m
          volumes:
            - name: elasticsearch-data
              emptyDir: {}   # stockage éphémère
      volumeClaimTemplates: []