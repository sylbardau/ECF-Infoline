name: Backend CI

on:
  push:
    branches:
      - DEV
    paths:
      - 'Applications/Backend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'Applications/Backend/**'

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: infoline-api
  EKS_CLUSTER: infoline-cluster
  TF_VERSION: "1.15.6"

jobs:
  test:
    name: tests
    runs-on: ubuntu-latest

    steps:
      - name: Validation du code
        uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build et tests Maven
        run: mvn clean verify -B
        working-directory: Applications/Backend/

      - name: Publication des résultats de tests
        uses: actions/upload-artifact@v5
        with:
          name: test-results
          path: Applications/Backend/target/surefire-reports/

  build-and-push:
    name: build & push image ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/DEV' && github.event_name == 'push'
    outputs:
      image: ${{ steps.build.outputs.image }}
 
    steps:
      - name: Checkout
        uses: actions/checkout@v5
 
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
 
      - name: Login à Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
 
      - name: Build et push de l'image Docker
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f Applications/Backend/dockerfile \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            Applications/Backend
 
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
 
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  deploy:
    name: déploiement sur EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
 
    steps:
      - name: Checkout
        uses: actions/checkout@v5
 
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
 
      - name: Lecture des outputs Terraform (RDS)
        id: tf-outputs
        working-directory: ./Terraform
        run: |
          terraform init
          echo "db_host=$(terraform output -raw db_instance_endpoint | cut -d: -f1)" >> "$GITHUB_OUTPUT"
          echo "db_secret_arn=$(terraform output -raw db_instance_master_user_secret_arn)" >> "$GITHUB_OUTPUT"
 
      - name: Récupération du mot de passe RDS (Secrets Manager)
        id: db-secret
        run: |
          PASSWORD=$(aws secretsmanager get-secret-value \
            --secret-id "${{ steps.tf-outputs.outputs.db_secret_arn }}" \
            --query SecretString --output text | jq -r .password)
          echo "::add-mask::$PASSWORD"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"
 
      - name: Mise à jour du kubeconfig
        run: aws eks update-kubeconfig --name "${{ env.EKS_CLUSTER }}" --region "${{ env.AWS_REGION }}"
 
      - name: Application des manifests Kubernetes
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          DB_HOST: ${{ steps.tf-outputs.outputs.db_host }}
        run: |
          sed \
            -e "s#965932218164.dkr.ecr.eu-west-3.amazonaws.com/infoline-api:<IMAGE_TAG>#${IMAGE}#" \
            -e "s#<DB_HOST>#${DB_HOST}#" \
            K8s/backend-deploy.yaml | kubectl apply -f -
 
      - name: Création/MAJ du Secret des identifiants RDS
        env:
          DB_PASSWORD: ${{ steps.db-secret.outputs.password }}
        run: |
          kubectl create secret generic infoline-backend-db \
            --namespace infoline \
            --from-literal=SPRING_DATASOURCE_USERNAME=admininfoline \
            --from-literal=SPRING_DATASOURCE_PASSWORD="$DB_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -
 
      - name: Vérification du rollout
        run: kubectl rollout status deployment/infoline-backend -n infoline --timeout=180s