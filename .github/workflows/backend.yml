name: Backend CI

on:
  push:
    branches: 
      - DEV
  pull_request:
    branches: 
      - main

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: infoline-api
  EKS_CLUSTER: infoline-cluster

jobs:
  test:
    name: tests
    runs-on: ubuntu-latest

    steps:
      - name: Validation du code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build et tests Maven
        run: mvn clean verify -B

      - name: Publication des résultats de tests
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
