name: Frontend CI

on:
  push:
    branches:
      - DEV
    paths:
      - 'Applications/Frontend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'Applications/Frontend/**'

env:
  AWS_REGION: eu-west-3
  IMAGE_NAME: ghcr.io/sylbardau/infoline-front
  EKS_CLUSTER: infoline-cluster
  TF_VERSION: "1.15.6"

jobs:
  test:
    name: tests
    runs-on: ubuntu-latest

    steps:
      - name: Validation du code
        uses: actions/checkout@v5

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Applications/Frontend/package-lock.json

      - name: Installation des dépendances
        run: npm ci
        working-directory: Applications/Frontend/

      - name: Tests unitaires
        run: npm run test -- --watch=false --browsers=ChromeHeadless
        working-directory: Applications/Frontend/

      - name: Build de vérification (production)
        run: npm run build -- --configuration production
        working-directory: Applications/Frontend/

  build-and-push:
    name: build & push image GHCR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/DEV' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push de l'image Docker
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -f Applications/Frontend/dockerfile \
            -t "$IMAGE_NAME:$IMAGE_TAG" \
            -t "$IMAGE_NAME:latest" \
            Applications/Frontend

          docker push "$IMAGE_NAME:$IMAGE_TAG"
          docker push "$IMAGE_NAME:latest"

          echo "image=$IMAGE_NAME:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  deploy:
    name: déploiement sur EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Mise à jour du kubeconfig
        run: aws eks update-kubeconfig --name "${{ env.EKS_CLUSTER }}" --region "${{ env.AWS_REGION }}"

      - name: Application des manifests Kubernetes
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image }}
        run: |
          sed \
            -e "s#ghcr.io/sylbardau/infoline-front:<IMAGE_TAG>#${IMAGE}#" \
            K8s/frontend-deploy.yaml | kubectl apply -f -

      - name: Vérification du rollout
        run: kubectl rollout status deployment/infoline-frontend -n infoline --timeout=180s